# aigc-cli Configuration
# Place this file at ~/.config/aigc-cli/config.yaml
# or pass --config /path/to/config.yaml at runtime

# ── 全局顶层配置 ──
# 作为所有命令的兜底。当命令没有通过 defaults.{cmd}.provider 引用命名 Provider 时使用。
# 如果配置了 providers 段且命令引用了命名 Provider，则对应字段优先生效。

# API key (can also be set via OPENAI_API_KEY env var)
# 使用本地模型（Ollama / LM Studio / localhost）时可不填
api_key: "your-api-key-here"

# API base URL (can also be set via OPENAI_BASE_URL env var)
# ── 按 Provider 取消注释 ──
# OpenAI:    https://api.openai.com/v1
# OpenRouter: https://openrouter.ai/api/v1
# APIMart:    https://api.apimart.ai
# Ollama:    http://localhost:11434 （无需 API Key）
# 任意中转:   https://your-relay.com/v1
base_url: "https://api.apimart.ai"

# HTTP proxy (can also be set via HTTP_PROXY / HTTPS_PROXY env vars, or --http-proxy CLI flag)
# http_proxy: "http://127.0.0.1:7890"

# Verbose output: show full result JSON (can also use --verbose / -v CLI flag)
# verbose: true

# Output directory for downloaded files (default: current directory ".")
# Can also use --output CLI flag
# output_dir: "./downloads"

# OpenRouter app attribution (optional)
# Set via env vars: OPENAI_REFERER="https://your-site.com" OPENAI_APP_TITLE="Your App"

# Global timeout in seconds for HTTP requests (default: 180s).
# Modality-specific timeout overrides this if set.
# timeout: 300

# ── 命名 Provider ──
# 定义可复用的 API 账号/端点，名字由用户自定义。
# 在 defaults.{cmd}.provider 中引用。
#
# type 字段标明协议类型（默认 openai）:
#   openai    — OpenAI 兼容协议（OpenAI、OpenRouter、APIMart、任意中转）
#   ollama    — Ollama 本地（OpenAI 子集，无需 API Key）
#   google    — Google Gemini API（预留）
#   anthropic — Anthropic Messages API（预留）
#   local     — 本地 ONNX 模型（OCR / Vision / Detect / Background）
#
# 未配置的字段继承全局顶层值（api_key / base_url / http_proxy）。
providers:
  # 示例：OpenRouter 专用账号
  # openrouter:
  #   type: openai
  #   api_key: "sk-or-xxx"
  #   base_url: "https://openrouter.ai/api/v1"

  # 示例：Ollama 本地模型
  # ollama:
  #   type: ollama
  #   base_url: "http://localhost:11434/v1"

  # 示例：本地 ONNX 模型目录
  # local:
  #   type: local
  #   models_dir: "~/.config/aigc-cli/models"

# ── 各命令默认值 ──
# Commented-out values use built-in defaults.
# Uncomment only what you want to override.
# Global --model flag overrides per-modality defaults.
defaults:
  # ── 各命令可通过 provider 字段引用命名 Provider，不填则用全局 api_key/base_url ──

  # ── 各命令可通过 provider 字段引用命名 Provider ──
  # 不填则用全局 api_key/base_url
  # 填 "local" 则走本地 ONNX 模型（内置伪 Provider，无需定义）
  #
  # 示例：所有命令共用同一个账号
  # image:
  #   provider: "main-account"
  #   model: "dall-e-3"
  # video:
  #   provider: "main-account"
  # audio:
  #   provider: "main-account"
  # chat:
  #   provider: "main-account"
  #   model: "gpt-4o"

  # ── APIMart 推荐配置（默认不使用命名 Provider）──
  image:
    model: "gpt-image-2-official"
    size: "3:1"
    resolution: "1k"
    quality: "low"
    output_format: "png"

  video:
    model: "doubao-seedance-2.0"

  audio:
    speak_model: "gpt-4o-mini-tts"
    transcribe_model: "whisper-tiny"

  midjourney:
    speed: "fast"
    version: "6.1"

  chat:
    model: "deepseek-v4-flash"

  # ── 可选：离线命令对接在线 LLM ──
  # 配置了 provider 则走在线，不配则走本地 ONNX
  # ocr:
  #   provider: "my-openrouter"
  #   model: "gpt-4o"
  # vision:
  #   provider: "my-openrouter"
  #   model: "gpt-4o-vision"
  # detect:
  #   provider: "my-apimart"
  # background:
  #   provider: "my-apimart"

  # ── 可选：强制走本地 ONNX（无需配 provider）──
  # 命令行 aigc-cli ocr scan x.png --provider local 即可

# ── 典型配置场景 ──

# 场景 A：多命令共用同一个账号
# providers:
#   main:
#     api_key: "sk-xxx"
#     base_url: "https://api.apimart.ai"
# defaults:
#   image:
#     provider: "main"
#   video:
#     provider: "main"
#   audio:
#     provider: "main"

# 场景 B：不同厂商
# providers:
#   or:
#     type: openai
#     api_key: "sk-or-xxx"
#     base_url: "https://openrouter.ai/api/v1"
#   local:
#     type: ollama
#     base_url: "http://localhost:11434/v1"
# defaults:
#   image:
#     provider: "or"
#     model: "openai/gpt-image-2"
#   chat:
#     provider: "local"
#   audio:
#     provider: "or"

# 场景 C：离线命令用本地 + 在线用云端
# providers:
#   online:
#     api_key: "sk-xxx"
#     base_url: "https://api.apimart.ai"
# defaults:
#   chat:
#     provider: "online"
#   ocr:                          # 不配 provider → 走本地 ONNX
#   vision:                       # 同上

# 场景 D：向后兼容（完全无 providers 段）
# api_key: "sk-xxx"
# base_url: "https://api.apimart.ai"
# 行为与 v1.x 完全一致
