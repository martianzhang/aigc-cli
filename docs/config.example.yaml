# aigc-cli Configuration
# Place this file at ~/.config/aigc-cli/config.yaml
# or pass --config /path/to/config.yaml at runtime

# API key (can also be set via OPENAI_API_KEY env var)
api_key: "your-api-key-here"

# API base URL (can also be set via OPENAI_BASE_URL env var)
# ── 按 Provider 取消注释 ──
# OpenAI:    https://api.openai.com/v1
# OpenRouter: https://openrouter.ai/api/v1
# APIMart:    https://api.apimart.ai
# 任意中转:   https://your-relay.com/v1
base_url: "https://api.apimart.ai"

# HTTP proxy (can also be set via HTTP_PROXY / HTTPS_PROXY env vars, or --http-proxy CLI flag)
# http_proxy: "http://127.0.0.1:7890"

# Verbose output: show full result JSON (can also use --verbose / -v CLI flag)
# verbose: true

# Output directory for downloaded files (default: current directory ".")
# Can also use --output CLI flag
# output_dir: "./downloads"

# OpenRouter app attribution (optional)
# Set via env vars: OPENAI_REFERER="https://your-site.com" OPENAI_APP_TITLE="Your App"

# Global timeout in seconds for HTTP requests (default: 180s).
# Modality-specific timeout overrides this if set.
# timeout: 300

# Per-modality default values. Commented-out values use built-in defaults.
# Uncomment only what you want to override.
# Global --model flag overrides per-modality defaults.
defaults:
  # ── OpenAI 推荐配置 ──
  # image:
  #   model: "dall-e-3"             # 或 dall-e-2、gpt-image-1
  #   size: "1024x1024"             # dall-e-3: 1024x1024, 1024x1792, 1792x1024
  #   quality: "standard"            # standard 或 hd
  #   n: 1
  # video:
  #   # OpenAI 视频尚未公开 API，可用 OpenRouter 中转
  # chat:
  #   model: "gpt-4o"

  # ── OpenRouter 推荐配置 ──
  # image:
  #   model: "openai/gpt-image-2" # OpenRouter 模型名格式: provider/model
  #   size: "1:1"
  # video:
  #   model: "google/veo-3.1"
  # chat:
  #   model: "openai/gpt-4o"

  # ── APIMart 推荐配置 ──
  image:
    model: "gpt-image-2-official"
    # Most economical: 1536x512·Low → $0.00144/image
    size: "3:1" # 3:1 + 1k → 1881x836 / 1536x512 (built-in default: "1:1")
    resolution: "1k" # Lowest resolution tier, APIMart only (no built-in default)
    quality: "low" # Fastest/cheapest quality tier (built-in default: "auto")
    # output_format: "png"            # png, jpg, webp, default: png
    # style: "vivid"                # OpenAI: vivid or natural
    # n: 1
    # output_compression: 85
    # timeout: 300                  # HTTP timeout in seconds (overrides global timeout)

  video:
    model: "doubao-seedance-2.0" # APIMart only
    # size: "16:9"
    # resolution: "480p"
    # duration: 5
    # timeout: 600                  # HTTP timeout in seconds (video takes longer)

  midjourney:
    # speed: "relax"              # relax (default) / fast / turbo
    # version: "6.1"              # MJ 主版本：8.1, 7, 6.1, 5.2, 5.1
    # style: "raw"                # 风格覆盖
    # size: "16:9"                # 宽高比
    # quality: "1"                # 质量：0.25, 0.5, 1, 2
    # niji: false                 # Niji 模式
    # timeout: 600                 # HTTP timeout in seconds

  chat:
    model: "deepseek-v4-flash"
    # Agent Loop 设置（聊天中生成图片/视频）
    # max_iterations: 10              # 每次用户消息，LLM 最多连续调工具次数（默认 10）
    # tools:                          # 允许的工具白名单（glob 模式），空或 ["*"] = 全部允许
    #   - "*"
    # disable_tools:                  # 禁用的工具黑名单（glob 模式），覆盖 tools
    #   - "generate_video"
    # allow_tool_override: false      # true=LLM参数优先, false=配置强制覆盖LLM（默认false,省钱）

# Ideas prompt search data.
# ideas.json is stored at ~/.config/aigc-cli/ideas/ by default.
# Uncomment to customize the data path:
# ideas:
#   data_path: "~/.config/aigc-cli/ideas/ideas.json"   # custom ideas.json path

# AIGC detection (detect command).
# ONNX Runtime + model files are stored at ~/.config/aigc-cli/models/ by default.
# detect:
#   models_dir: "~/.config/aigc-cli/models"    # custom models directory
#   model: "vit-base"                          # "vit-base" (default, 86M) or "distilled-vit" (11.8M)
