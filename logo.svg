<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 105" width="400" height="105">
  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="105" rx="14" fill="url(#bg)"/>

  <!-- Terminal prompt -->
  <g transform="translate(24, 55)">
    <rect x="-4" y="-46" width="52" height="52" rx="8" fill="url(#accent)" opacity="0.15"/>
    <text x="6" y="-8" font-family="'Courier New', 'Consolas', monospace" font-size="34" font-weight="bold" fill="url(#accent)">&gt;_</text>
  </g>

  <!-- Sparkle -->
  <g fill="url(#accent)" opacity="0.9">
    <polygon transform="translate(68, 25)" points="8,0 10,6 16,8 10,10 8,16 6,10 0,8 6,6"/>
    <polygon transform="translate(80, 13)" points="4,0 5,3 8,4 5,5 4,8 3,5 0,4 3,3" opacity="0.5"/>
  </g>

  <!-- Name -->
  <text x="100" y="58" font-family="'Segoe UI', -apple-system, sans-serif" font-size="42" font-weight="700" fill="#f1f5f9">aigc-cli</text>

  <!-- Tagline -->
  <text x="100" y="82" font-family="'Segoe UI', -apple-system, sans-serif" font-size="13" fill="#94a3b8" font-weight="400">Unified AI Content CLI</text>
</svg>
