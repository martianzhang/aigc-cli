name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
      - name: Vet
        run: go vet ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Test
        env:
          CGO_ENABLED: "1"
        run: go test ./... -v -count=1

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Build
        env:
          CGO_ENABLED: "1"
        run: go build -ldflags="-s -w" -o aigc-cli .

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint, test, build]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            label: linux-amd64
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            label: linux-arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            label: darwin-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            label: darwin-arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
            label: windows-amd64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
        run: |
          ext=""
          [ "$GOOS" = "windows" ] && ext=".exe"
          name="aigc-cli-${{ matrix.label }}$ext"
          go build -ldflags="-s -w" -o "$name" .
          echo "binary=$name" >> "$GITHUB_ENV"
      - name: Upload Release Asset
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ github.ref_name }}"
          gh release upload "$tag" "${{ env.binary }}" --clobber 2>/dev/null || \
            gh release create "$tag" "${{ env.binary }}" --title "$tag" --generate-notes
