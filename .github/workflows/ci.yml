name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
      - name: Vet
        run: go vet ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Test
        run: go test ./... -v -count=1

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Build
        run: go build -ldflags="-s -w" -o apimart-cli .

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint, test, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Cross-compile
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          ext=""
          [ "$GOOS" = "windows" ] && ext=".exe"
          name="apimart-cli-$GOOS-$GOARCH$ext"
          go build -ldflags="-s -w" -o "$name" .
          echo "Built: $name"
      - name: Prepare Release Notes
        id: notes
        run: |
          tag="${{ github.ref_name }}"
          notes_file="docs/release_notes/${tag}.md"
          if [ -f "$notes_file" ]; then
            echo "notes_file=$notes_file" >> "$GITHUB_OUTPUT"
          else
            echo "notes_file=" >> "$GITHUB_OUTPUT"
          fi
      - name: Upload to Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ext=""
          [ "${{ matrix.goos }}" = "windows" ] && ext=".exe"
          name="apimart-cli-${{ matrix.goos }}-${{ matrix.goarch }}$ext"
          tag="${{ github.ref_name }}"
          notes_flag=""
          if [ -n "${{ steps.notes.outputs.notes_file }}" ]; then
            notes_flag="--notes-file ${{ steps.notes.outputs.notes_file }}"
          fi
          # Upload artifacts (first upload needs --create, subsequent --clobber)
          gh release upload "$tag" "$name" --clobber 2>/dev/null || \
            gh release create "$tag" $notes_flag "$name" --title "$tag" --generate-notes
