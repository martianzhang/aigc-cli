name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Install system deps (CGO)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
      - name: Vet
        run: go vet ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Install system deps (CGO)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Test
        env:
          CGO_ENABLED: "1"
        run: go test ./... -v -count=1

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Install system deps (CGO)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Build
        env:
          CGO_ENABLED: "1"
        run: go build -ldflags="-s -w" -o aigc-cli .

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint, test, build]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            label: linux-amd64
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            label: linux-arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            label: darwin-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            label: darwin-arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
            label: windows-amd64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Build (Windows)
        shell: bash
        if: matrix.goos == 'windows'
        env:
          GOOS: windows
          GOARCH: ${{ matrix.goarch }}
        run: |
          choco install mingw -y --no-progress 2>/dev/null || true
          export PATH="/c/ProgramData/chocolatey/bin:/c/ProgramData/chocolatey/lib/mingw/tools/install/mingw64/bin:$PATH"
          go mod download
          bash scripts/build-helper.sh
          name="aigc-cli-${{ matrix.label }}.exe"
          go build -ldflags="-s -w" -o "$name" .
          dll_dir=$(go env GOMODCACHE)/github.com/k2-fsa/sherpa-onnx-go-windows@v1.13.4/lib
          for arch in x86_64-pc-windows-gnu i686-pc-windows-gnu; do
            [ -d "$dll_dir/$arch" ] && { cp "$dll_dir/$arch/"*.dll .; break; }
          done
          7z a "aigc-cli-${{ matrix.label }}.zip" "$name" *.dll || true
          # keep runtime DLLs for standalone asset upload below
          rm -f "$name"
          echo "binary=aigc-cli-${{ matrix.label }}.zip" >> "$GITHUB_ENV"
      - name: Install system deps (CGO, Linux)
        if: matrix.goos == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Build (Unix - helper + binary)
        shell: bash
        if: matrix.goos != 'windows'
        run: |
          go mod download
          bash scripts/build-helper.sh
          name="aigc-cli-${{ matrix.label }}"
          go build -ldflags="-s -w" -o "$name" .
          # Package: helper + sherpa-onnx lib + binary
          os_pkg="${{ matrix.goos }}"; [ "$os_pkg" = "darwin" ] && os_pkg="macos"
          sherpa_dir=$(go env GOMODCACHE)/github.com/k2-fsa/sherpa-onnx-go-${os_pkg}@v1.13.4
          case "${{ matrix.label }}" in
            darwin-*) lib_dir="$sherpa_dir/lib/$(ls $sherpa_dir/lib/ | head -1)" ;;
            linux-*)  lib_dir="$sherpa_dir/lib/$(ls $sherpa_dir/lib/ | head -1)" ;;
          esac
          shopt -s nullglob
          tar czf "aigc-cli-${{ matrix.label }}.tar.gz" "$name" libaigc-sherpa-helper.* "$lib_dir"/*.so "$lib_dir"/*.dylib 2>/dev/null
          # keep runtime libs for standalone asset upload below
          cp "$lib_dir"/libsherpa-onnx-c-api.* . 2>/dev/null || true
          echo "binary=aigc-cli-${{ matrix.label }}.tar.gz" >> "$GITHUB_ENV"
      - name: Upload Release Asset
        shell: bash
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ github.ref_name }}"
          notes_file="docs/release_notes/${tag}.md"
          notes_flag="--generate-notes"
          [ -f "$notes_file" ] && notes_flag="--notes-file $notes_file"

          # Create release with notes, or upload to existing
          gh release create "$tag" "${{ env.binary }}" --title "$tag" $notes_flag 2>/dev/null || \
            gh release upload "$tag" "${{ env.binary }}" --clobber

          # If release already existed, update notes
          [ -f "$notes_file" ] && gh release edit "$tag" --notes-file "$notes_file" 2>/dev/null || true

          # Upload shared libraries separately (for audio init download)
          for f in libaigc-sherpa-helper.* aigc-sherpa-helper.dll \
                   libsherpa-onnx-c-api.* sherpa-onnx-c-api.dll \
                   libonnxruntime.*.dylib onnxruntime.dll libonnxruntime.so; do
            [ -f "$f" ] && gh release upload "$tag" "$f" --clobber || true
          done
